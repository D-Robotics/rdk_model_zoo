model_parameters:
  onnx_model: './UNet_11.onnx'
  march: "bayes-e"
  layer_out_dump: False
  working_dir: 'unet_resnet50_bayese_512x512_nv12'
  output_model_file_prefix: 'unet_resnet50_bayese_512x512_nv12'

  

  node_info: {
  }


input_parameters:
  input_name: ""
  input_type_rt: 'nv12'
  input_type_train: 'rgb'
  input_layout_train: 'NCHW'
  input_shape: ''
  norm_type: 'data_scale'
  mean_value: 0
  scale_value: 0.003921568627451


calibration_parameters:
  cal_data_dir: './unet'
  cal_data_type: 'float32'
  calibration_type: 'default'
  preprocess_on: True


compiler_parameters:
  compile_mode: 'latency'
  debug: False
  optimize_level: 'O3'
  core_num: 1
  jobs: 16
